<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your SkillForge Academy learning dashboard." />
  <title>Dashboard — SkillForge Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lms.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="SkillForge Academy home">
        <span class="logo-mark" aria-hidden="true">SF</span>
        <span class="logo-text">SkillForge</span>
      </a>

      <nav class="primary-nav" aria-label="Dashboard navigation" style="position:static;transform:none;flex-direction:row;align-items:center;padding:0;background:none;border:none;gap:var(--space-4);">
        <a href="index.html#courses" class="nav-link">Catalogue</a>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div class="student-avatar" id="nav-student-avatar" aria-hidden="true">ST</div>
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text)" id="nav-student-name"></span>
        </div>
        <button class="btn btn-secondary" data-action="logout" style="padding:var(--space-2) var(--space-4);font-size:var(--text-sm)">
          Log Out
        </button>
      </nav>
    </div>
  </header>

  <!-- ── LMS Layout ──────────────────────────────────────────────────────── -->
  <div class="lms-layout">

    <!-- Sidebar -->
    <aside class="lms-sidebar" aria-label="Learning navigation">
      <p class="lms-sidebar-heading">Learning</p>

      <a href="dashboard.html" class="lms-nav-item is-active">
        <svg class="lms-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>

      <a href="index.html#courses" class="lms-nav-item">
        <svg class="lms-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        All Courses
      </a>

      <a href="#cert-section" class="lms-nav-item">
        <svg class="lms-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
        </svg>
        Certificates
      </a>

      <div style="height:1px;background:var(--color-border);margin:var(--space-4) var(--space-6)"></div>
      <p class="lms-sidebar-heading">Account</p>

      <button class="lms-nav-item" data-action="logout" style="width:100%;text-align:left;cursor:pointer;background:none;border:none;">
        <svg class="lms-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log Out
      </button>
    </aside>

    <!-- Main Content -->
    <main class="lms-main" id="main-content">

      <!-- Welcome header -->
      <div class="dashboard-header">
        <div class="dashboard-greeting">
          <h1>Welcome back, <span id="dash-name">Student</span> 👋</h1>
          <p>Pick up where you left off.</p>
        </div>
        <div class="student-avatar" id="dash-avatar" aria-hidden="true">ST</div>
      </div>

      <!-- Quick stats -->
      <div class="dashboard-stats" role="list" aria-label="Learning statistics">
        <div class="dash-stat-card" role="listitem">
          <span class="dash-stat-value" id="stat-enrolled">–</span>
          <span class="dash-stat-label">Courses Enrolled</span>
        </div>
        <div class="dash-stat-card" role="listitem">
          <span class="dash-stat-value" id="stat-completed">–</span>
          <span class="dash-stat-label">Courses at 60%+</span>
        </div>
        <div class="dash-stat-card" role="listitem">
          <span class="dash-stat-value" id="stat-certs">–</span>
          <span class="dash-stat-label">Certificates</span>
        </div>
        <div class="dash-stat-card" role="listitem">
          <span class="dash-stat-value" id="stat-avg">–</span>
          <span class="dash-stat-label">Avg Progress</span>
        </div>
      </div>

      <!-- Enrolled courses -->
      <section aria-labelledby="enrolled-heading">
        <h2 class="lms-section-heading" id="enrolled-heading">My Courses</h2>
        <div class="lms-loading" aria-label="Loading your courses">
          <div class="spinner" role="status"><span class="sr-only">Loading…</span></div>
        </div>
        <div id="enrolled-grid" class="enrolled-grid" aria-live="polite"></div>
      </section>

      <!-- Certificates -->
      <section id="cert-section" aria-labelledby="cert-heading" style="display:none;margin-top:var(--space-10)">
        <h2 class="lms-section-heading" id="cert-heading">My Certificates 🏆</h2>
        <div id="cert-grid" class="cert-grid" aria-live="polite"></div>
      </section>

    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
